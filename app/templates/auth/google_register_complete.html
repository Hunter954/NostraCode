{% extends 'base.html' %}
{% block title %}Completar cadastro{% endblock %}
{% block content %}
<div class="auth card wide">
  <h1>Completar cadastro</h1>
  <p>Confirme seus dados para finalizar o cadastro com Google.</p>
  <form method="post" class="form grid two">
    <label>Nome<input name="name" value="{{ profile.name }}" required></label>
    <label>E-mail<input type="email" value="{{ profile.email }}" disabled></label>
    <label>Empresa/projeto<input name="company" required></label>
    <label>WhatsApp<input name="whatsapp"></label>
    <label>CPF/CNPJ<input name="document"></label>
    <label class="check"><input type="checkbox" name="accepted_terms" required> Aceito os termos de uso</label>
    <button class="btn" type="submit"><i class="bi bi-google"></i> Finalizar cadastro</button>
  </form>
</div>
{% endblock %}
