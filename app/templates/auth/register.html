{% extends 'base.html' %}
{% block title %}Cadastro{% endblock %}
{% block content %}
<div class="auth card wide">
  <h1>Criar conta</h1>
  <form method="post" class="form grid two">
    <label>Nome<input name="name" required></label>
    <label>E-mail<input type="email" name="email" required></label>
    <label>Senha<input type="password" name="password" required minlength="6"></label>
    <label>Empresa/projeto<input name="company" required></label>
    <label>WhatsApp<input name="whatsapp"></label>
    <label>CPF/CNPJ<input name="document"></label>
    <label class="check"><input type="checkbox" name="accepted_terms" required> Aceito os termos de uso</label>
    <button class="btn" type="submit"><i class="bi bi-person-plus"></i>Criar conta</button>
  </form>
  <div class="auth-switch">
    <span>Já tem cadastro?</span>
    <a href="{{ url_for('main.login') }}">Entrar agora</a>
  </div>
</div>
{% endblock %}
