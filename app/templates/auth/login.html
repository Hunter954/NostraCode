{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth card">
  <h1>Entrar</h1>
  <p>Acesse seu painel para acompanhar projetos, cobranças e atualizações.</p>
  <a class="btn google-btn" href="{{ url_for('main.login_google') }}"><i class="bi bi-google"></i> Entrar com Google</a>
  <div class="auth-separator"><span>ou entre com e-mail</span></div>
  <form method="post" class="form">
    <label>E-mail<input type="email" name="email" required></label>
    <label>Senha<input type="password" name="password" required></label>
    <button class="btn" type="submit"><i class="bi bi-box-arrow-in-right"></i>Entrar</button>
  </form>
  <div class="auth-switch">
    <span>Não tem cadastro?</span>
    <a href="{{ url_for('main.register') }}">Cadastre-se</a>
  </div>
</div>
{% endblock %}
