<div class="table-wrap"><table><thead><tr><th>Fatura</th><th>Projeto</th><th>Período</th><th>Total</th><th>Status</th><th>Vencimento</th><th></th></tr></thead><tbody>{% for invoice in invoices %}<tr><td>#{{ invoice.number }}</td><td>{{ invoice.project.name }}</td><td>{{ invoice.period }}</td><td>{{ invoice.total|brl }}</td><td><span class="pill {{ invoice.status|replace(' ', '-') }}">{{ invoice.status }}</span></td><td>{{ invoice.due_date|datebr }}</td><td><a href="{{ url_for('main.invoice_detail', invoice_id=invoice.id) }}">Detalhes</a></td></tr>{% else %}<tr><td colspan="7">Nenhuma fatura encontrada.</td></tr>{% endfor %}</tbody></table></div>
