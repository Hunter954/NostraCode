{% extends 'base.html' %}
{% block title %}Nova fatura{% endblock %}
{% block content %}
<div class="auth card wide"><h1>Nova fatura</h1><form method="post" class="form grid two"><label>Número<input name="number" value="{{ suggested_number }}" required></label><label>Projeto<select name="project_id" required>{% for project in projects %}<option value="{{ project.id }}">{{ project.name }} - {{ project.client.name }}</option>{% endfor %}</select></label><label>Período<input name="period" placeholder="Março/2026" required></label><label>Vencimento<input type="date" name="due_date" required></label><label>Custo Railway<input name="railway_cost" value="0.00"></label><label>Gestão técnica<input name="management_fee" value="50.00"></label><label>Descontos<input name="discounts" value="0.00"></label><label>Multa/Juros<input name="fines" value="0.00"></label><label>Status<select name="status"><option>pendente</option><option>aguardando pagamento</option><option>pago</option><option>atrasado</option><option>cancelado</option></select></label><button class="btn">Criar fatura</button></form></div>
{% endblock %}
