{% extends "base.html" %}
{% block content %}
<div style="margin:20px;">
  <a href="/admin" class="btn" style="margin-bottom:20px;display:inline-block;padding:10px 16px;border-radius:10px;background:#111;color:#fff;">← Voltar</a>
  <h1>Clientes</h1>
  <table>
    <tr><th>Nome</th><th>Email</th><th>Ações</th></tr>
    {% for c in clients %}
    <tr>
      <form method="POST" action="/admin/clients/update/{{c.id}}">
      <td><input name="name" value="{{c.name}}"></td>
      <td><input name="email" value="{{c.email}}"></td>
      <td>
        <button type="submit">Salvar</button>
        <a href="/admin/clients/delete/{{c.id}}" onclick="return confirm('Excluir?')">Excluir</a>
      </td>
      </form>
    </tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
